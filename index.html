<!DOCTYPE html>
<html>
<head>
    <title>Smart Health Monitoring</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
</head>

<body style="text-align:center; font-family:Arial;">

<h1>Predictive Health Monitoring & Emergency Alert System</h1>

<h2>Temperature: <span id="temp">--</span> °C</h2>
<h2>Heart Rate: <span id="hr">--</span> BPM</h2>

<h2 id="status">Normal</h2>
<h3 id="risk">Risk Level: 0%</h3>

<h3>📍 Location: <span id="location">Fetching...</span></h3>

<div id="alertBox" style="display:none; background:red; color:white; padding:15px;">
🚨 EMERGENCY ALERT SENT! <br>
📩 SMS sent to caregiver <br>
</div>

<br>
<canvas id="myChart" width="400" height="200"></canvas>

<script>

// LOCATION (GPS)
if (navigator.geolocation) {
    navigator.geolocation.getCurrentPosition(function(position) {
        let lat = position.coords.latitude.toFixed(4);
        let lon = position.coords.longitude.toFixed(4);
        document.getElementById("location").innerText = lat + ", " + lon;
    });
} else {
    document.getElementById("location").innerText = "Not available";
}

// STATUS
function updateStatus(hr, temp) {
    let status = document.getElementById("status");

    if (hr > 110 || temp > 38) {
        status.innerText = "Emergency";
        status.style.color = "red";
        showAlert();
    } else if (hr > 95) {
        status.innerText = "Warning";
        status.style.color = "orange";
    } else {
        status.innerText = "Normal";
        status.style.color = "green";
    }
}

// RISK %
function updateRisk(hr) {
    let risk = Math.min(100, Math.floor((hr / 120) * 100));
    document.getElementById("risk").innerText = "Risk Level: " + risk + "%";
}

// ALERT BOX
function showAlert() {
    document.getElementById("alertBox").style.display = "block";
}

// CHART
let ctx = document.getElementById('myChart').getContext('2d');

let chart = new Chart(ctx, {
    type: 'line',
    data: {
        labels: [],
        datasets: [{
            label: 'Heart Rate',
            data: [],
            borderWidth: 2
        }]
    }
});

function updateChart(val) {
    chart.data.labels.push(new Date().toLocaleTimeString());
    chart.data.datasets[0].data.push(val);

    if (chart.data.labels.length > 10) {
        chart.data.labels.shift();
        chart.data.datasets[0].data.shift();
    }

    chart.update();
}

// SIMULATION
setInterval(() => {

    let hr = Math.floor(Math.random() * 40) + 70;
    let temp = (Math.random() * 2 + 36).toFixed(1);

    document.getElementById("hr").innerText = hr;
    document.getElementById("temp").innerText = temp;

    updateStatus(hr, temp);
    updateRisk(hr);
    updateChart(hr);

}, 2000);

</script>

</body>
</html>
